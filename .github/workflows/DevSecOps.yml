name: CI/CD Pipeline
run-name: "${{ github.actor }} - ${{ github.run_id }}"

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      buildMode:
        description: "Qual ação deseja fazer?"
        required: true
        default: 'Build'
        type: choice
        options:
          - Build
          - Build + Tag Validation
          - Build + Tag Validation + Deploy
      environments:
        description: "Selecione o ambiente de implantação"
        required: true
        default: 'DEV'
        type: environment

jobs:
  build:
    name: DevSecOps Pipeline
    uses: felipementel/gh-actions/.github/workflows/dotnet-sandbox-api-build.yml@main
    with:
      buildMode: ${{ github.event_name == 'workflow_dispatch' && inputs.buildMode || 'Build' }}
      environment: ${{ inputs.environments || 'DEV' }}
      dotnetVersion: '10.x'
      projectBaseDir: ./src
      solutionFileName: 'UsuariosApi.slnx'
      mainProject: 'Usuarios.Api'
      testsFolder: 'tests'
      reportTitle: 'Canal DEPLOY'
      sonarExclusions: ''
      imageName: 'usuariosapi'
      openAPIFolder: 'open-api'
      msgCanalDeploy: 'Canal DEPLOY - O melhor canal sobre .NET, Azure, DevOps e IA'
      dockerFileFullPath: './src/Dockerfile'
      dockerBuildContext: '.'
      dockerSetup: true
      registry: 'ghcr.io'
    permissions:
      security-events: write
      contents: write
      id-token: write
      packages: write
    secrets:
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}

  deploy:
    name: Deploy to Azure Container Apps
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.buildMode == 'Build + Tag Validation + Deploy' && needs.build.outputs.image-exists == 'false' }}
    needs: [build]
    uses: felipementel/gh-actions/.github/workflows/dotnet-sandbox-api-deploy-aca.yml@main
    permissions:
      id-token: write
      contents: read
      packages: read
    with:
      environment: ${{ inputs.environments || 'DEV' }}
      tagVersion: ${{ needs.build.outputs.tag-version }}
      imageName: 'usuariosapi'
      registry: 'ghcr.io'
      msgCanalDeploy: 'Canal DEPLOY - O melhor canal sobre .NET, Azure, DevOps e IA'
      azureRgBase: ${{ vars.AZURE_RG }}
      acaeBaseName: ${{ vars.AZURE_ACAE_BASE }}
      healthCheckPath: '/health/live'
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
